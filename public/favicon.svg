<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" fill="url(#faviconGradient)" rx="45"/>
  
  <!-- Main geometric design - simplified for favicon -->
  <g fill="white">
    <!-- Center circle -->
    <circle cx="96" cy="96" r="28" opacity="0.9"/>
    
    <!-- Top triangle - growth -->
    <path d="M 96 40 L 110 70 L 82 70 Z" opacity="0.85"/>
    
    <!-- Bottom left square - foundation -->
    <rect x="55" y="110" width="25" height="25" opacity="0.8"/>
    
    <!-- Bottom right accent -->
    <circle cx="128" cy="130" r="12" opacity="0.75"/>
  </g>
  
  <!-- Connecting lines - productivity flow -->
  <g stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6">
    <line x1="96" y1="68" x2="96" y2="110"/>
    <line x1="96" y1="110" x2="67" y2="122"/>
    <line x1="96" y1="110" x2="128" y2="130"/>
  </g>
</svg>
