name: Web CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/web/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
  pull_request:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/shared/**'

jobs:
  build:
    name: Build & Lint Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @superapp/web lint

      - name: Build
        run: pnpm --filter @superapp/shared build --if-present && pnpm --filter @superapp/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
