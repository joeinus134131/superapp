name: Mobile Release (Production)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
      submit:
        description: 'Submit to store after build?'
        required: true
        default: false
        type: boolean

jobs:
  build-and-submit:
    name: EAS Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: EAS Build Production
        working-directory: packages/mobile
        run: eas build --platform ${{ inputs.platform }} --profile production --non-interactive

      - name: EAS Submit to Store
        if: ${{ inputs.submit == 'true' }}
        working-directory: packages/mobile
        run: eas submit --platform ${{ inputs.platform }} --profile production --non-interactive
